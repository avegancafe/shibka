<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Shibka — Dog Merge Game</title>
  <meta name="description" content="All roads lead to Shiba — a dog-breed take on the Suika / Watermelon merge game." />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png?v=8" />
  <link rel="icon" type="image/png" sizes="128x128" href="assets/favicon.png?v=8" />
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192.png?v=8" />

  <!-- Progressive Web App -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#F2A03D" />
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png?v=8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Shibka" />

  <!-- Social preview (Open Graph + Twitter) -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Shibka — Dog Merge Game" />
  <meta property="og:description" content="All roads lead to Shiba — a dog-breed take on the Suika / Watermelon merge game." />
  <meta property="og:url" content="https://shibka.kyleholzinger.dev/" />
  <meta property="og:image" content="https://shibka.kyleholzinger.dev/assets/social-preview.png" />
  <meta property="og:image:width" content="1280" />
  <meta property="og:image:height" content="640" />
  <meta property="og:image:alt" content="Shibka — all roads lead to Shiba (a black-and-tan Shiba Inu face)" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Shibka — Dog Merge Game" />
  <meta name="twitter:description" content="All roads lead to Shiba — a dog-breed take on the Suika / Watermelon merge game." />
  <meta name="twitter:image" content="https://shibka.kyleholzinger.dev/assets/social-preview.png" />

  <link rel="stylesheet" href="css/style.css?v=11" />
</head>
<body>
  <header class="dedication">To the best fiancée in the world, Elise 💚</header>

  <main class="app">
    <header class="topbar">
      <div class="topbar-row">
        <h1 class="logo">Shibka <span class="paw">🐾</span></h1>
        <div class="stats">
          <div class="stat">
            <span class="stat-label">Score</span>
            <span class="stat-value" id="score">0</span>
          </div>
          <div class="stat">
            <span class="stat-label">Best</span>
            <span class="stat-value" id="best">0</span>
          </div>
        </div>
      </div>
      <!-- Account widget (login state, profile, logout) — filled by auth.js -->
      <div id="account" class="account"></div>
    </header>

    <div class="play-wrap">
      <canvas id="game-canvas"></canvas>

      <div id="game-over" class="overlay hidden">
        <div class="overlay-card">
          <h2>Good dog!</h2>
          <p>Final score</p>
          <div class="final" id="final-score">0</div>
          <button id="restart-button" class="btn">Play again</button>
        </div>
      </div>
    </div>

    <footer class="bottombar">
      <div class="next">
        <span class="next-label">Next up</span>
        <span id="next-dog" class="next-dog"></span>
      </div>
      <p class="hint">Move to aim · Click / Space / Tap to drop · Merge matching pups</p>

      <!-- Global leaderboard — filled by auth.js (best score per display name) -->
      <section class="leaderboard" id="leaderboard">
        <span class="lb-title">Leaderboard</span>
        <ol class="lb-list" id="leaderboard-list">
          <li class="lb-empty">Loading…</li>
        </ol>
        <span class="lb-me" id="leaderboard-me"></span>
      </section>

      <section class="evolution">
        <span class="evo-label">Dog Evolution</span>
        <div class="evo-ring-wrap">
          <canvas id="evolution-ring"></canvas>
          <div id="evo-tip" class="evo-tip hidden"></div>
        </div>
        <span class="evo-hint">Hover or tap a pup to see its breed</span>
      </section>
    </footer>
  </main>

  <script src="vendor/matter.min.js"></script>
  <script src="js/dogs.js?v=11"></script>
  <script src="js/game.js?v=11"></script>
  <script src="js/auth.js?v=11"></script>

  <script>
    // Register the service worker for offline play + home-screen install, and
    // keep it self-updating so the app is always the latest deploy.
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        // Whether a worker already controlled this page when it loaded. If so, a
        // later controllerchange means a NEW version took over -> reload once to
        // run it. (On the very first visit there's no prior controller, so we
        // don't reload on the initial claim.)
        var hadController = !!navigator.serviceWorker.controller;
        var refreshing = false;
        navigator.serviceWorker.addEventListener("controllerchange", function () {
          if (refreshing || !hadController) return;
          refreshing = true;
          window.location.reload();
        });

        navigator.serviceWorker
          .register("sw.js", { updateViaCache: "none" })
          .then(function (reg) {
            // Check for a new worker every time the page is opened.
            reg.update();
          })
          .catch(function () {});
      });
    }
  </script>
</body>
</html>
