<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shibka has moved</title>
  <meta name="robots" content="noindex" />
  <!--
    Shibka migration bridge — served on the OLD origin (avegancafe.github.io/shibka).
    The game moved to https://shibka.kyleholzinger.dev. This page recovers a player's
    stranded anonymous best score (localStorage "shibka_best" on this origin) and
    carries it to the new site via a URL *fragment* (#import_best=N) — no cross-origin
    request, so no CORS and no anonymous backend endpoint. The new site folds it into
    its offline score queue, which flushes to the account on sign-in.

    TEMPORARY: retire when the long tail of returning players dries up (~6–12 months).
    Teardown: delete the gh-pages branch + set repo Settings → Pages → Source = None,
    and remove the import reader/consumer on the new site. See DEPLOY.md.

    Design notes:
    - We NEVER delete shibka_best — there is no cross-origin ack that the handoff
      landed, and re-handing-off the same value is idempotent on the new side
      (GREATEST). So a future visit safely re-imports if the first attempt was lost.
    - We clear ONLY Shibka's own service worker + caches (scope "/shibka", cache
      prefix "shibka-") so a stale old PWA can't keep serving the dead game, without
      touching other projects that share the avegancafe.github.io origin.
    - This page ships NO service worker of its own.
  -->
  <style>
    :root { --bg: #FBF3E7; --card: #FFFCF7; --ink: #4A3B2A; --soft: #8A7458; --accent: #F2A03D; }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100%; padding: 24px;
    }
    .card {
      background: var(--card);
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(120, 90, 50, 0.18);
      max-width: 420px; width: 100%;
      padding: 32px 28px; text-align: center;
    }
    .paw { font-size: 44px; line-height: 1; }
    h1 { font-size: 22px; margin: 14px 0 6px; }
    p { color: var(--soft); line-height: 1.45; margin: 8px 0; }
    .score { color: var(--accent); font-weight: 800; font-variant-numeric: tabular-nums; }
    .go {
      display: inline-block; margin-top: 18px;
      background: var(--accent); color: #fff; text-decoration: none;
      font-weight: 700; padding: 12px 20px; border-radius: 999px;
    }
    .hide { display: none; }
    .small { font-size: 12px; margin-top: 14px; }
  </style>
</head>
<body>
  <main class="card">
    <div class="paw">🐕</div>
    <h1>Shibka has a new home</h1>
    <p id="with-score" class="hide">
      We found your old score (<span class="score" id="score">0</span>).
      We’ll bring it with you.
    </p>
    <p id="confirmed" class="hide">✓ Your score is safe on the new Shibka. Taking you there…</p>
    <p id="moved" class="hide">This game has moved. Taking you to the new Shibka…</p>
    <p id="no-score" class="hide">Taking you to the new Shibka…</p>
    <a class="go" id="go" href="https://shibka.kyleholzinger.dev/">Take me to the new Shibka →</a>
    <p class="small">Not redirected? <a id="go2" href="https://shibka.kyleholzinger.dev/">shibka.kyleholzinger.dev</a></p>
  </main>

  <noscript>
    <p style="text-align:center">
      Shibka has moved to <a href="https://shibka.kyleholzinger.dev/">shibka.kyleholzinger.dev</a>.
    </p>
  </noscript>

  <script>
    (function () {
      "use strict";
      var NEW_URL = "https://shibka.kyleholzinger.dev/";
      var MAX = 100000000;
      // Set ONLY after the new site confirms it durably received the score (or
      // there was nothing to migrate). Once set, this page just shows the moved UI
      // and stops re-attempting the import. Distinct from the old shibka_handoff_done
      // flag, which marked a mere *attempt* — we no longer use that as the signal.
      var MIGRATED_KEY = "shibka_migrated";

      function clamp(v) {
        var n = Math.floor(Number(v) || 0);
        return isFinite(n) && n > 0 && n <= MAX ? n : 0;
      }
      // Highest stranded score on THIS origin — from the legacy key, or (if the new
      // game ever ran here and its migrate() moved+deleted shibka_best) the
      // shibka_scores queue. Never deleted, so re-reads/re-migrations stay safe.
      function readBest() {
        var best = 0;
        try { best = Math.max(best, clamp(localStorage.getItem("shibka_best"))); } catch (e) {}
        try {
          var arr = JSON.parse(localStorage.getItem("shibka_scores") || "[]");
          if (Array.isArray(arr)) {
            for (var i = 0; i < arr.length; i++) {
              if (arr[i] && typeof arr[i].score === "number") best = Math.max(best, clamp(arr[i].score));
            }
          }
        } catch (e) {}
        return best;
      }
      function isMigrated() { try { return localStorage.getItem(MIGRATED_KEY) === "1"; } catch (e) { return false; } }
      function setMigrated() { try { localStorage.setItem(MIGRATED_KEY, "1"); } catch (e) {} }
      function show(id) { var el = document.getElementById(id); if (el) el.classList.remove("hide"); }

      // best>0 carries the score AND asks the new site to confirm receipt back to us
      // (#confirm=1), so we set the migrated flag only once it has truly landed.
      function target(best) {
        return best > 0 ? NEW_URL + "#import_best=" + best + "&confirm=1" : NEW_URL;
      }

      function withTimeout(p, ms) { return Promise.race([p, new Promise(function (r) { setTimeout(r, ms); })]); }

      // Clear ONLY Shibka's own stale SW + caches on this shared github.io origin.
      function cleanup() {
        var jobs = [];
        try {
          if ("serviceWorker" in navigator) {
            jobs.push(navigator.serviceWorker.getRegistrations().then(function (regs) {
              return Promise.all(regs
                .filter(function (r) { return (r.scope || "").indexOf("/shibka") !== -1; })
                .map(function (r) { return r.unregister(); }));
            }));
          }
        } catch (e) {}
        try {
          if (window.caches && caches.keys) {
            jobs.push(caches.keys().then(function (keys) {
              return Promise.all(keys
                .filter(function (k) { return k.indexOf("shibka-") === 0; })
                .map(function (k) { return caches.delete(k); }));
            }));
          }
        } catch (e) {}
        return Promise.all(jobs);
      }

      var navigated = false;
      function go(best, delay) {
        if (navigated) return;
        navigated = true;
        var dest = target(best);
        var a = document.getElementById("go"), a2 = document.getElementById("go2");
        if (a) a.href = dest;
        if (a2) a2.href = dest;
        setTimeout(function () {
          withTimeout(cleanup(), 1000).then(function () { location.replace(dest); });
        }, delay || 0);
      }

      var params = new URLSearchParams(location.hash.slice(1));
      var migParam = params.get("migrated");

      // (1) Confirmation bounced back from the new site: it durably received `migVal`.
      if (migParam !== null) {
        var migVal = clamp(migParam);
        var b1 = readBest();
        history.replaceState(null, "", location.pathname + location.search);
        if (b1 <= migVal) {
          // Everything we hold is confirmed on the new origin -> safe to flag.
          setMigrated();
          show("confirmed");
          go(0, 1200);            // forward to the new site as the final destination
        } else {
          // We still hold a higher score than was confirmed (tampered confirm, or
          // the best grew between attempts) -> do NOT flag; re-migrate the real best.
          var s = document.getElementById("score"); if (s) s.textContent = b1.toLocaleString();
          show("with-score");
          go(b1, 1600);
        }
        return;
      }

      // (2) Already confirmed-migrated on a prior visit -> just the lightweight moved UI.
      if (isMigrated()) {
        show("moved");
        go(0, 1200);
        return;
      }

      // (3) Not migrated yet -> attempt it.
      var best = readBest();
      if (best > 0) {
        var sc = document.getElementById("score"); if (sc) sc.textContent = best.toLocaleString();
        show("with-score");
        var dest = target(best);
        var go1 = document.getElementById("go");
        if (go1) { go1.href = dest; go1.addEventListener("click", function (e) { e.preventDefault(); go(best, 0); }); }
        var go2 = document.getElementById("go2"); if (go2) go2.href = dest;
        go(best, 2000);          // ~2s to read, then hand off + ask for confirmation
      } else {
        // Nothing to migrate -> trivially done. Flag it and forward.
        setMigrated();
        show("no-score");
        go(0, 600);
      }
    })();
  </script>
</body>
</html>
