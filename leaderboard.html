<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leaderboard — Shibka</title>
  <meta name="description" content="The Shibka leaderboard — search players and browse the full ranking." />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png?v=8" />
  <link rel="icon" type="image/png" sizes="128x128" href="assets/favicon.png?v=8" />
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#F2A03D" />
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png?v=8" />
  <link rel="stylesheet" href="css/style.css?v=15" />
</head>
<body>
  <header class="dedication">To the best fiancée in the world, Elise 💚</header>

  <main class="lbpage">
    <div class="lbpage-top">
      <a class="lbpage-back" href="/">← Back to the game</a>
      <h1 class="lbpage-title">🏆 Leaderboard</h1>
    </div>

    <form class="lbpage-search" id="lb-search-form" role="search">
      <input
        id="lb-search"
        type="search"
        inputmode="search"
        autocomplete="off"
        maxlength="50"
        placeholder="Search players…"
        aria-label="Search players by name"
      />
    </form>

    <ol class="lb-list lbpage-list" id="lbpage-list">
      <li class="lb-empty">Loading…</li>
    </ol>

    <div class="lbpage-pager" id="lb-pager" hidden>
      <button class="btn btn-ghost" id="lb-prev" type="button">‹ Prev</button>
      <span class="lbpage-status" id="lb-status"></span>
      <button class="btn btn-ghost" id="lb-next" type="button">Next ›</button>
    </div>
  </main>

  <script src="js/leaderboard.js?v=15"></script>

  <script>
    // Same self-updating service worker as the game (scope "/"), so this page is
    // part of the installable app and stays the latest deploy.
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        var hadController = !!navigator.serviceWorker.controller;
        var refreshing = false;
        navigator.serviceWorker.addEventListener("controllerchange", function () {
          if (refreshing || !hadController) return;
          refreshing = true;
          window.location.reload();
        });
        navigator.serviceWorker
          .register("sw.js", { updateViaCache: "none" })
          .then(function (reg) { reg.update(); })
          .catch(function () {});
      });
    }
  </script>
</body>
</html>
