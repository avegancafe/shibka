name: Deploy to EC2

# On every push to main, SSH into the EC2 box and run deploy/deploy.sh, which
# pulls the new code, builds the image natively (arm64), runs the idempotent
# Neon migration, and restarts the container. Caddy (already running on the box)
# reverse-proxies shibka.kyleholzinger.dev -> the container over proxy_net.
#
# The deploy.sh health gate (GET /healthz) fails the job if the app or DB
# didn't come up. One-time box setup + repo secrets are in DEPLOY.md.

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual "Run workflow" from the Actions tab

concurrency:
  group: deploy-ec2
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        # Pin to a tag for readability; pin to a full commit SHA for stricter
        # supply-chain safety.
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          command_timeout: 15m
          script_stop: true
          script: |
            set -euo pipefail
            cd ~/apps/shibka
            ./deploy/deploy.sh
